<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ぷにぷにクラフト 〜むげんのせかい〜</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#aee9ff; font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic",sans-serif; touch-action:none; }
  canvas { display:block; }

  /* ===== タイトル画面 ===== */
  #title {
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:linear-gradient(180deg,#ffd6ec 0%,#ffeef7 35%,#d2f3ff 70%,#b9ecc9 100%);
  }
  #title h1 { font-size:min(11vw,64px); color:#ff6fae; text-shadow:0 4px 0 #fff,0 7px 0 #ffb7d5; letter-spacing:2px; }
  #title .sub { font-size:min(4.5vw,20px); color:#7a6b8a; margin-top:-8px; }
  .btn {
    border:none; cursor:pointer; font-family:inherit; font-weight:bold;
    background:#ff8fc7; color:#fff; font-size:min(5.5vw,24px); padding:14px 44px; border-radius:999px;
    box-shadow:0 6px 0 #e26ba6; transition:transform .08s;
  }
  .btn:active { transform:translateY(4px); box-shadow:0 2px 0 #e26ba6; }
  .btn.green { background:#7fd98f; box-shadow:0 6px 0 #5cb86d; }
  .btn.green:active { box-shadow:0 2px 0 #5cb86d; }
  #worldList { display:flex; flex-direction:column; gap:8px; max-height:30vh; overflow-y:auto; width:min(85vw,360px); }
  .worldRow { display:flex; gap:6px; }
  .worldRow .load { flex:1; background:#fff; border:3px solid #ffb7d5; border-radius:14px; padding:10px 14px; font-family:inherit; font-size:16px; color:#7a6b8a; cursor:pointer; text-align:left; font-weight:bold; }
  .worldRow .del { background:#fff; border:3px solid #ddd; border-radius:14px; width:46px; cursor:pointer; font-size:16px; }
  #title .hint { font-size:12px; color:#9a8aaa; text-align:center; line-height:1.7; padding:0 20px; }

  /* ===== ゲームUI ===== */
  #hud { position:fixed; inset:0; z-index:10; pointer-events:none; display:none; }

  #hotbar { position:absolute; bottom:max(10px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); display:flex; gap:5px; pointer-events:auto; padding:6px; background:rgba(255,255,255,.45); border-radius:18px; backdrop-filter:blur(4px); }
  .slot { width:44px; height:44px; border-radius:12px; border:3px solid rgba(255,255,255,.8); display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; box-shadow:inset 0 -6px 0 rgba(0,0,0,.12); }
  .slot.sel { border-color:#ff6fae; transform:scale(1.12); box-shadow:0 0 10px #ff9ec9, inset 0 -6px 0 rgba(0,0,0,.12); }
  @media (max-width:520px){ .slot{ width:34px; height:34px; font-size:15px; border-radius:9px; } }

  #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:22px; color:#fff; text-shadow:0 0 4px rgba(0,0,0,.5); }

  #topbar { position:absolute; top:max(8px,env(safe-area-inset-top)); left:10px; right:10px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; }
  #topbar .pill { background:rgba(255,255,255,.6); border-radius:999px; padding:6px 14px; font-size:13px; color:#7a6b8a; font-weight:bold; backdrop-filter:blur(4px); }
  #homeBtn { pointer-events:auto; border:none; background:rgba(255,255,255,.7); border-radius:999px; padding:8px 16px; font-family:inherit; font-weight:bold; color:#ff6fae; font-size:14px; cursor:pointer; }

  /* モバイル操作 */
  #joy { position:absolute; left:18px; bottom:80px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.3); border:3px solid rgba(255,255,255,.6); pointer-events:auto; display:none; }
  #joyKnob { position:absolute; left:50%; top:50%; width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,.85); transform:translate(-50%,-50%); box-shadow:0 3px 8px rgba(0,0,0,.2); }
  #jumpBtn, #modeBtn { position:absolute; right:18px; pointer-events:auto; display:none; border:none; font-family:inherit; font-weight:bold; border-radius:50%; width:70px; height:70px; font-size:13px; color:#fff; }
  #jumpBtn { bottom:80px; background:rgba(127,217,143,.9); box-shadow:0 4px 0 rgba(92,184,109,.9); }
  #modeBtn { bottom:165px; background:rgba(255,143,199,.9); box-shadow:0 4px 0 rgba(226,107,166,.9); font-size:12px; }

  #msg { position:absolute; top:18%; left:50%; transform:translateX(-50%); background:rgba(255,255,255,.85); color:#ff6fae; font-weight:bold; padding:10px 22px; border-radius:999px; font-size:15px; opacity:0; transition:opacity .4s; white-space:nowrap; }
</style>
</head>
<body>

<div id="title">
  <h1>ぷにぷにクラフト</h1>
  <div class="sub">🍓 むげんに ひろがる おかしの せかい 🍭</div>
  <button class="btn green" id="newWorldBtn">✨ あたらしい せかいへ</button>
  <div id="worldList"></div>
  <div class="hint">
    ブロックを こわしたり おいたりして じぶんだけの せかいを つくろう！<br>
    せかいは どこまでも つづくよ。とちゅうの せかいは じどうで セーブされるよ。
  </div>
</div>

<div id="hud">
  <div id="crosshair">🩷</div>
  <div id="topbar">
    <div class="pill" id="clockPill">☀️ ひる</div>
    <button id="homeBtn">🏠 ホーム</button>
  </div>
  <div id="hotbar"></div>
  <div id="joy"><div id="joyKnob"></div></div>
  <button id="jumpBtn">ジャンプ</button>
  <button id="modeBtn">⛏️ こわす</button>
  <div id="msg"></div>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ================= ブロック定義 ================= */
const B = { air:0, grass:1, dirt:2, stone:3, wood:4, leaf:5, flower:6,
            straw:7, choco:8, soda:9, lemon:10, lav:11, snow:12, light:13 };
const COL = {
  [B.grass]:{ top:0xa8e6a1, side:0xc9e0a0, bot:0xd9b38c },
  [B.dirt] :{ top:0xd9b38c, side:0xd9b38c, bot:0xcaa57e },
  [B.stone]:{ top:0xc9c6dd, side:0xbdbad4, bot:0xb0adc8 },
  [B.wood] :{ top:0xd6b08e, side:0xc69b7b, bot:0xd6b08e },
  [B.leaf] :{ top:0xffc2db, side:0xffb7d5, bot:0xf3a4c6 },
  [B.flower]:{top:0xff8fc7, side:0xff8fc7, bot:0xff8fc7 },
  [B.straw]:{ top:0xffa9c0, side:0xff9eb5, bot:0xf590a8 },
  [B.choco]:{ top:0x9a7253, side:0x8d6748, bot:0x805c3f },
  [B.soda] :{ top:0xa9e4f5, side:0x9adcf0, bot:0x8bd0e6 },
  [B.lemon]:{ top:0xffefb0, side:0xffe79e, bot:0xf5da8c },
  [B.lav]  :{ top:0xd7c2f5, side:0xcdb4f0, bot:0xc0a6e6 },
  [B.snow] :{ top:0xfffafd, side:0xfff7fb, bot:0xf0e9f0 },
  [B.light]:{ top:0xfff7bb, side:0xfff3a8, bot:0xffefa0 },
};
const HOTBAR = [
  { t:B.grass, e:'🌱', c:'#a8e6a1' }, { t:B.straw, e:'🍓', c:'#ff9eb5' },
  { t:B.choco, e:'🍫', c:'#8d6748' }, { t:B.soda,  e:'🥤', c:'#9adcf0' },
  { t:B.lemon, e:'🍋', c:'#ffe79e' }, { t:B.lav,   e:'🍇', c:'#cdb4f0' },
  { t:B.snow,  e:'⛄', c:'#fff7fb' }, { t:B.light, e:'⭐', c:'#fff3a8' },
  { t:B.flower,e:'🌸', c:'#ff8fc7' }, { t:B.wood,  e:'🪵', c:'#c69b7b' },
];
const SOLID = t => t > 0 && t !== B.flower;

/* ================= 地形生成 ================= */
let seed = 1;
function hash2(x, z, s=0){ const n = Math.sin(x*127.1 + z*311.7 + (seed+s)*74.7) * 43758.5453; return n - Math.floor(n); }
function vnoise(x, z, s=0){
  const xi=Math.floor(x), zi=Math.floor(z), sm=t=>t*t*(3-2*t);
  const xf=sm(x-xi), zf=sm(z-zi);
  const a=hash2(xi,zi,s), b=hash2(xi+1,zi,s), c=hash2(xi,zi+1,s), d=hash2(xi+1,zi+1,s);
  return a + (b-a)*xf + (c-a)*zf + (a-b-c+d)*xf*zf;
}
const HMAX = 48;
function terrainH(x, z){
  return Math.max(2, Math.floor(5 + vnoise(x/19, z/19)*9 + vnoise(x/53, z/53, 7)*11));
}
function treeAt(x, z){ // この柱に木が生えるか
  if (hash2(x, z, 33) > 0.012) return 0;
  return terrainH(x, z); // 幹の根元の高さを返す
}
const edits = new Map(); // "x,y,z" -> type
function blockAt(x, y, z){
  if (y < 0 || y >= HMAX) return B.air;
  const e = edits.get(x+','+y+','+z);
  if (e !== undefined) return e;
  const h = terrainH(x, z);
  if (y < h){
    if (y === h-1) return B.grass;
    if (y > h-4) return B.dirt;
    return B.stone;
  }
  // 木（幹・はっぱ）： 周囲±1の柱の木をチェック
  for (let dx=-1; dx<=1; dx++) for (let dz=-1; dz<=1; dz++){
    const th = treeAt(x+dx, z+dz);
    if (!th) continue;
    if (dx===0 && dz===0 && y >= th && y < th+3) return B.wood;
    if (y >= th+2 && y < th+5){
      if (y === th+4 && (dx!==0 || dz!==0)) continue; // てっぺんは1個
      return B.leaf;
    }
  }
  // お花
  if (y === h && hash2(x, z, 51) < 0.06 && !treeAt(x,z)) return B.flower;
  return B.air;
}
function topY(x, z){
  for (let y=HMAX-1; y>=0; y--) if (SOLID(blockAt(x,y,z))) return y+1;
  return 2;
}

/* ================= 3D セットアップ ================= */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 300);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
scene.fog = new THREE.Fog(0xaee9ff, 40, 110);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(40, 80, 25);
scene.add(sun);
const amb = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(amb);

// ふわふわ雲
const clouds = [];
const cloudMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.85 });
for (let i=0; i<14; i++){
  const g = new THREE.Group();
  for (let j=0; j<5; j++){
    const m = new THREE.Mesh(new THREE.BoxGeometry(4+Math.random()*5, 1.6, 3+Math.random()*4), cloudMat);
    m.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*1.2, (Math.random()-0.5)*6);
    g.add(m);
  }
  g.position.set((Math.random()-0.5)*240, 56+Math.random()*10, (Math.random()-0.5)*240);
  g.userData.v = 0.4 + Math.random()*0.6;
  scene.add(g); clouds.push(g);
}

/* ================= チャンクメッシュ ================= */
const CH = 16, RADIUS = 3;
const chunks = new Map(); // "cx,cz" -> mesh
const chunkMat = new THREE.MeshLambertMaterial({ vertexColors:true });
const tmpC = new THREE.Color();

function buildChunk(cx, cz){
  const pos=[], nrm=[], col=[], idx=[];
  let vi = 0;
  const face = (verts, n, hex, shade)=>{
    tmpC.setHex(hex).multiplyScalar(shade);
    for (const v of verts){ pos.push(...v); nrm.push(...n); col.push(tmpC.r, tmpC.g, tmpC.b); }
    idx.push(vi, vi+1, vi+2, vi, vi+2, vi+3); vi += 4;
  };
  const cube = (x,y,z,t, s=1, yo=0)=>{
    const c = COL[t];
    const j = 1 + (hash2(x*3+y, z*3-y, 9)-0.5)*0.08; // ぷにぷに感（色ゆらぎ）
    const o = (1-s)/2;
    const x0=x+o, x1=x+o+s, y0=y+yo, y1=y+yo+s, z0=z+o, z1=z+o+s;
    const isLight = t===B.light;
    const sh = v => isLight ? 1.25 : v*j;
    if (s<1 || !SOLID(blockAt(x,y+1,z))) face([[x0,y1,z0],[x0,y1,z1],[x1,y1,z1],[x1,y1,z0]], [0,1,0], c.top, sh(1));
    if (s<1 || !SOLID(blockAt(x,y-1,z))) face([[x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1]], [0,-1,0], c.bot, sh(0.55));
    if (s<1 || !SOLID(blockAt(x+1,y,z))) face([[x1,y0,z0],[x1,y1,z0],[x1,y1,z1],[x1,y0,z1]], [1,0,0], c.side, sh(0.82));
    if (s<1 || !SOLID(blockAt(x-1,y,z))) face([[x0,y0,z1],[x0,y1,z1],[x0,y1,z0],[x0,y0,z0]], [-1,0,0], c.side, sh(0.82));
    if (s<1 || !SOLID(blockAt(x,y,z+1))) face([[x1,y0,z1],[x1,y1,z1],[x0,y1,z1],[x0,y0,z1]], [0,0,1], c.side, sh(0.72));
    if (s<1 || !SOLID(blockAt(x,y,z-1))) face([[x0,y0,z0],[x0,y1,z0],[x1,y1,z0],[x1,y0,z0]], [0,0,-1], c.side, sh(0.72));
  };
  for (let lx=0; lx<CH; lx++) for (let lz=0; lz<CH; lz++){
    const x = cx*CH+lx, z = cz*CH+lz;
    for (let y=0; y<HMAX; y++){
      const t = blockAt(x,y,z);
      if (t === B.air) continue;
      if (t === B.flower){ cube(x,y,z,t, 0.34, 0); cube(x,y,z,B.grass, 0.12, -0.0); continue; }
      cube(x,y,z,t);
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal', new THREE.Float32BufferAttribute(nrm,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(col,3));
  g.setIndex(idx);
  return new THREE.Mesh(g, chunkMat);
}
function refreshChunk(cx, cz){
  const k = cx+','+cz, old = chunks.get(k);
  if (old){ scene.remove(old); old.geometry.dispose(); }
  const m = buildChunk(cx, cz);
  scene.add(m); chunks.set(k, m);
}
function updateChunks(){
  const pcx = Math.floor(player.x/CH), pcz = Math.floor(player.z/CH);
  for (const [k, m] of chunks){
    const [cx,cz] = k.split(',').map(Number);
    if (Math.abs(cx-pcx) > RADIUS+1 || Math.abs(cz-pcz) > RADIUS+1){
      scene.remove(m); m.geometry.dispose(); chunks.delete(k);
    }
  }
  // 1フレーム1チャンクだけ生成（カクつき防止）
  for (let r=0; r<=RADIUS; r++)
    for (let cx=pcx-r; cx<=pcx+r; cx++) for (let cz=pcz-r; cz<=pcz+r; cz++){
      if (Math.max(Math.abs(cx-pcx), Math.abs(cz-pcz)) !== r) continue;
      if (!chunks.has(cx+','+cz)){ refreshChunk(cx, cz); return; }
    }
}

/* ================= プレイヤー ================= */
const player = { x:8, y:30, z:8, vy:0, yaw:0, pitch:-0.15, grounded:false };
const PR = 0.32, PH = 1.62;
function collideXZ(nx, nz){
  const y0 = Math.floor(player.y+0.05), y1 = Math.floor(player.y+PH-0.1);
  for (let y=y0; y<=y1; y++)
    for (const [ox,oz] of [[-PR,-PR],[PR,-PR],[-PR,PR],[PR,PR]])
      if (SOLID(blockAt(Math.floor(nx+ox), y, Math.floor(nz+oz)))) return true;
  return false;
}
function physics(dt){
  const sp = 5.2;
  let mx = 0, mz = 0;
  if (keys['KeyW'] || joyV.y < -0.25) mz -= 1;
  if (keys['KeyS'] || joyV.y > 0.25)  mz += 1;
  if (keys['KeyA'] || joyV.x < -0.25) mx -= 1;
  if (keys['KeyD'] || joyV.x > 0.25)  mx += 1;
  const len = Math.hypot(mx, mz) || 1;
  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  const dx = (mx*cos - mz*sin)/len * sp * dt;
  const dz = (mx*sin + mz*cos)/len * sp * dt;
  if (!collideXZ(player.x+dx, player.z)) player.x += dx;
  if (!collideXZ(player.x, player.z+dz)) player.z += dz;

  player.vy -= 24*dt;
  player.vy = Math.max(player.vy, -40);
  let ny = player.y + player.vy*dt;
  player.grounded = false;
  if (player.vy <= 0){
    const fy = Math.floor(ny);
    for (const [ox,oz] of [[-PR,-PR],[PR,-PR],[-PR,PR],[PR,PR]])
      if (SOLID(blockAt(Math.floor(player.x+ox), fy, Math.floor(player.z+oz)))){
        ny = fy+1; player.vy = 0; player.grounded = true; break;
      }
  } else {
    const hy = Math.floor(ny+PH);
    for (const [ox,oz] of [[-PR,-PR],[PR,-PR],[-PR,PR],[PR,PR]])
      if (SOLID(blockAt(Math.floor(player.x+ox), hy, Math.floor(player.z+oz)))){
        ny = player.y; player.vy = 0; break;
      }
  }
  player.y = ny;
  if (player.y < -10){ player.x=8; player.z=8; player.y = topY(8,8)+2; player.vy=0; }
  if ((keys['Space'] || jumpHeld) && player.grounded){ player.vy = 8.4; blip(420, 0.05); }

  camera.position.set(player.x, player.y+PH-0.18, player.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = -player.yaw;
  camera.rotation.x = player.pitch;
}

/* ================= ブロック操作 ================= */
function raycast(){
  const dir = new THREE.Vector3(0,0,-1).applyEuler(camera.rotation);
  let x = camera.position.x, y = camera.position.y, z = camera.position.z;
  let ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const sx = Math.sign(dir.x)||1, sy = Math.sign(dir.y)||1, sz = Math.sign(dir.z)||1;
  const tdx = Math.abs(1/(dir.x||1e-9)), tdy = Math.abs(1/(dir.y||1e-9)), tdz = Math.abs(1/(dir.z||1e-9));
  let tx = ((sx>0 ? ix+1-x : x-ix)) * tdx;
  let ty = ((sy>0 ? iy+1-y : y-iy)) * tdy;
  let tz = ((sz>0 ? iz+1-z : z-iz)) * tdz;
  let face = [0,0,0];
  for (let i=0; i<60; i++){
    if (tx < ty && tx < tz){ ix += sx; face=[-sx,0,0]; if (tx>6.5) break; tx += tdx; }
    else if (ty < tz){ iy += sy; face=[0,-sy,0]; if (ty>6.5) break; ty += tdy; }
    else { iz += sz; face=[0,0,-sz]; if (tz>6.5) break; tz += tdz; }
    const t = blockAt(ix, iy, iz);
    if (t !== B.air) return { x:ix, y:iy, z:iz, t, face };
  }
  return null;
}
function setBlock(x, y, z, t){
  edits.set(x+','+y+','+z, t);
  saveSoon();
  const cx = Math.floor(x/CH), cz = Math.floor(z/CH);
  refreshChunk(cx, cz);
  const lx = x-cx*CH, lz = z-cz*CH;
  if (lx===0) refreshChunk(cx-1,cz); if (lx===CH-1) refreshChunk(cx+1,cz);
  if (lz===0) refreshChunk(cx,cz-1); if (lz===CH-1) refreshChunk(cx,cz+1);
}
function breakBlock(){
  const hit = raycast();
  if (!hit || hit.y === 0) return;
  spawnParticles(hit.x+0.5, hit.y+0.5, hit.z+0.5, COL[hit.t].side);
  setBlock(hit.x, hit.y, hit.z, B.air);
  blip(180 + Math.random()*60, 0.07);
}
function placeBlock(){
  const hit = raycast();
  if (!hit) return;
  const x = hit.x+hit.face[0], y = hit.y+hit.face[1], z = hit.z+hit.face[2];
  if (y < 0 || y >= HMAX) return;
  // 自分の体の中には置けない
  if (Math.floor(player.x)===x && Math.floor(player.z)===z && (y===Math.floor(player.y)||y===Math.floor(player.y+1))) return;
  if (blockAt(x,y,z) !== B.air) return;
  setBlock(x, y, z, HOTBAR[selSlot].t);
  blip(520 + selSlot*40, 0.06);
}

/* ================= パーティクル ================= */
const particles = [];
const partGeo = new THREE.BoxGeometry(0.14, 0.14, 0.14);
function spawnParticles(x, y, z, hex){
  for (let i=0; i<8; i++){
    const m = new THREE.Mesh(partGeo, new THREE.MeshBasicMaterial({ color:hex }));
    m.position.set(x, y, z);
    m.userData = { vx:(Math.random()-0.5)*4, vy:Math.random()*4+1, vz:(Math.random()-0.5)*4, life:0.7 };
    scene.add(m); particles.push(m);
  }
}
function updParticles(dt){
  for (let i=particles.length-1; i>=0; i--){
    const p = particles[i], u = p.userData;
    u.vy -= 12*dt; u.life -= dt;
    p.position.x += u.vx*dt; p.position.y += u.vy*dt; p.position.z += u.vz*dt;
    p.scale.setScalar(Math.max(u.life/0.7, 0.01));
    if (u.life <= 0){ scene.remove(p); p.material.dispose(); particles.splice(i,1); }
  }
}

/* ================= どうぶつ（うさぎ） ================= */
const bunnies = [];
function makeBunny(){
  const g = new THREE.Group();
  const fur = new THREE.MeshLambertMaterial({ color: Math.random()<0.5 ? 0xfff4f8 : 0xffd9e8 });
  const pink = new THREE.MeshLambertMaterial({ color:0xff9ec9 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.45,0.7), fur); body.position.y=0.28; g.add(body);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.4,0.4), fur); head.position.set(0,0.62,0.28); g.add(head);
  for (const s of [-1,1]){
    const ear = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.42,0.1), fur); ear.position.set(0.11*s,1.0,0.25); g.add(ear);
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.08,0.02), new THREE.MeshBasicMaterial({color:0x4a3b3b})); eye.position.set(0.12*s,0.66,0.49); g.add(eye);
  }
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.06,0.02), pink); nose.position.set(0,0.56,0.49); g.add(nose);
  const tail = new THREE.Mesh(new THREE.BoxGeometry(0.16,0.16,0.16), pink); tail.position.set(0,0.3,-0.38); g.add(tail);
  return g;
}
function spawnBunnies(){
  for (const b of bunnies) scene.remove(b.g);
  bunnies.length = 0;
  for (let i=0; i<6; i++){
    const g = makeBunny();
    const x = player.x + (Math.random()-0.5)*30, z = player.z + (Math.random()-0.5)*30;
    g.position.set(x, topY(Math.floor(x), Math.floor(z)), z);
    scene.add(g);
    bunnies.push({ g, dir:Math.random()*Math.PI*2, t:Math.random()*3, hop:Math.random()*10 });
  }
}
function updBunnies(dt){
  for (const b of bunnies){
    b.t -= dt;
    if (b.t < 0){ b.t = 1.5+Math.random()*3; b.dir = Math.random()*Math.PI*2; }
    const nx = b.g.position.x + Math.sin(b.dir)*0.9*dt;
    const nz = b.g.position.z + Math.cos(b.dir)*0.9*dt;
    // プレイヤーから離れすぎたら近くへワープ
    if (Math.hypot(nx-player.x, nz-player.z) > 45){
      b.g.position.x = player.x + (Math.random()-0.5)*20;
      b.g.position.z = player.z + (Math.random()-0.5)*20;
    } else { b.g.position.x = nx; b.g.position.z = nz; }
    b.hop += dt*7;
    const gy = topY(Math.floor(b.g.position.x), Math.floor(b.g.position.z));
    b.g.position.y += ((gy + Math.abs(Math.sin(b.hop))*0.3) - b.g.position.y) * Math.min(dt*8,1);
    b.g.rotation.y = b.dir;
  }
}

/* ================= 昼夜サイクル ================= */
const DAY = 240; // 秒
let worldTime = DAY*0.25;
const skyDay = new THREE.Color(0xaee9ff), skyDusk = new THREE.Color(0xffc4d6), skyNight = new THREE.Color(0x33335e);
const sky = new THREE.Color();
function updSky(dt){
  worldTime = (worldTime + dt) % DAY;
  const p = worldTime / DAY; // 0..1
  let label;
  if (p < 0.40){ sky.copy(skyDay); label='☀️ ひる'; }
  else if (p < 0.50){ sky.lerpColors(skyDay, skyDusk, (p-0.40)/0.10); label='🌇 ゆうがた'; }
  else if (p < 0.60){ sky.lerpColors(skyDusk, skyNight, (p-0.50)/0.10); label='🌙 よる'; }
  else if (p < 0.90){ sky.copy(skyNight); label='🌙 よる'; }
  else { sky.lerpColors(skyNight, skyDay, (p-0.90)/0.10); label='🌅 あさ'; }
  renderer.setClearColor(sky);
  scene.fog.color.copy(sky);
  const dayness = p<0.45 ? 1 : p<0.6 ? 1-(p-0.45)/0.15 : p<0.9 ? 0 : (p-0.9)/0.1;
  sun.intensity = 0.4 + dayness*1.0;
  amb.intensity = 0.45 + dayness*0.4;
  const pill = document.getElementById('clockPill');
  if (pill.textContent !== label) pill.textContent = label;
}

/* ================= サウンド ================= */
let actx = null;
function blip(freq, dur){
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.12, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e){}
}

/* ================= 入力 ================= */
const keys = {};
let selSlot = 0, mobileMode = 'break', jumpHeld = false;
const joyV = { x:0, y:0 };
const isTouch = 'ontouchstart' in window;

addEventListener('keydown', e=>{
  keys[e.code] = true;
  if (e.code.startsWith('Digit')){
    const n = +e.code.slice(5), i = n===0 ? 9 : n-1;
    if (HOTBAR[i]) selectSlot(i);
  }
});
addEventListener('keyup', e=> keys[e.code] = false);

const cv = renderer.domElement;
if (!isTouch){
  cv.addEventListener('click', ()=>{ if (playing && document.pointerLockElement !== cv) cv.requestPointerLock(); });
  addEventListener('mousemove', e=>{
    if (document.pointerLockElement !== cv) return;
    player.yaw += e.movementX*0.0024;
    player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch - e.movementY*0.0024));
  });
  addEventListener('mousedown', e=>{
    if (document.pointerLockElement !== cv) return;
    if (e.button === 0) breakBlock(); else if (e.button === 2) placeBlock();
  });
  addEventListener('contextmenu', e=> e.preventDefault());
  addEventListener('wheel', e=> selectSlot((selSlot + (e.deltaY>0?1:-1) + HOTBAR.length) % HOTBAR.length));
}

// --- タッチ操作 ---
let lookId = -1, lookX = 0, lookY = 0, lookMoved = 0, lookT = 0;
const joy = document.getElementById('joy'), knob = document.getElementById('joyKnob');
let joyId = -1;
function joyMove(t){
  const r = joy.getBoundingClientRect();
  let dx = (t.clientX-(r.left+r.width/2))/(r.width/2), dy = (t.clientY-(r.top+r.height/2))/(r.height/2);
  const l = Math.hypot(dx,dy); if (l>1){ dx/=l; dy/=l; }
  joyV.x = dx; joyV.y = dy;
  knob.style.left = (50+dx*36)+'%'; knob.style.top = (50+dy*36)+'%';
}
joy.addEventListener('touchstart', e=>{ e.preventDefault(); joyId = e.changedTouches[0].identifier; joyMove(e.changedTouches[0]); });
addEventListener('touchmove', e=>{
  for (const t of e.changedTouches){
    if (t.identifier === joyId) joyMove(t);
    else if (t.identifier === lookId){
      player.yaw += (t.clientX-lookX)*0.0045;
      player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch - (t.clientY-lookY)*0.0045));
      lookMoved += Math.abs(t.clientX-lookX)+Math.abs(t.clientY-lookY);
      lookX = t.clientX; lookY = t.clientY;
    }
  }
}, { passive:false });
addEventListener('touchend', e=>{
  for (const t of e.changedTouches){
    if (t.identifier === joyId){ joyId=-1; joyV.x=0; joyV.y=0; knob.style.left='50%'; knob.style.top='50%'; }
    if (t.identifier === lookId){
      if (lookMoved < 12 && performance.now()-lookT < 400) (mobileMode==='break' ? breakBlock : placeBlock)();
      lookId = -1;
    }
  }
});
cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  for (const t of e.changedTouches){
    if (t.identifier === joyId) continue;
    if (lookId === -1){ lookId=t.identifier; lookX=t.clientX; lookY=t.clientY; lookMoved=0; lookT=performance.now(); }
  }
}, { passive:false });

const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); jumpHeld = true; });
jumpBtn.addEventListener('touchend', ()=> jumpHeld = false);
const modeBtn = document.getElementById('modeBtn');
modeBtn.addEventListener('touchstart', e=>{
  e.preventDefault();
  mobileMode = mobileMode==='break' ? 'place' : 'break';
  modeBtn.textContent = mobileMode==='break' ? '⛏️ こわす' : '🧱 おく';
  showMsg(mobileMode==='break' ? 'タップで ブロックを こわすよ！' : 'タップで ブロックを おくよ！');
});

/* ================= UI ================= */
const hotbarEl = document.getElementById('hotbar');
HOTBAR.forEach((h, i)=>{
  const d = document.createElement('div');
  d.className = 'slot'; d.style.background = h.c; d.textContent = h.e;
  d.addEventListener('pointerdown', e=>{ e.stopPropagation(); selectSlot(i); });
  hotbarEl.appendChild(d);
});
function selectSlot(i){
  selSlot = i;
  [...hotbarEl.children].forEach((el,j)=> el.classList.toggle('sel', j===i));
  if (isTouch && mobileMode==='break'){ mobileMode='place'; modeBtn.textContent='🧱 おく'; }
}
let msgTimer;
function showMsg(text){
  const m = document.getElementById('msg');
  m.textContent = text; m.style.opacity = 1;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(()=> m.style.opacity = 0, 2500);
}

/* ================= セーブ / ロード ================= */
const PREFIX = 'puniWorld_';
let saveTimer = null;
function saveSoon(){ clearTimeout(saveTimer); saveTimer = setTimeout(saveNow, 1500); }
function saveNow(){
  if (!playing) return;
  try {
    localStorage.setItem(PREFIX+seed, JSON.stringify({
      seed, edits:[...edits.entries()], px:player.x, py:player.y, pz:player.z,
      yaw:player.yaw, time:worldTime, saved:Date.now(),
    }));
  } catch(e){}
}
function listWorlds(){
  const out = [];
  for (let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if (k && k.startsWith(PREFIX)){
      try { out.push(JSON.parse(localStorage.getItem(k))); } catch(e){}
    }
  }
  return out.sort((a,b)=> b.saved-a.saved);
}

/* ================= ゲーム開始/終了 ================= */
let playing = false;
function startWorld(data){
  edits.clear();
  for (const m of chunks.values()){ scene.remove(m); m.geometry.dispose(); }
  chunks.clear();
  if (data){
    seed = data.seed;
    for (const [k,v] of data.edits) edits.set(k, v);
    player.x = data.px; player.y = data.py; player.z = data.pz;
    player.yaw = data.yaw || 0; worldTime = data.time || DAY*0.25;
  } else {
    seed = Math.floor(Math.random()*999999)+1;
    player.x = 8.5; player.z = 8.5; player.yaw = 0; worldTime = DAY*0.25;
    player.y = topY(8, 8) + 1;
  }
  player.vy = 0; player.pitch = -0.15;
  // 足場が確定してから高さ補正
  player.y = Math.max(player.y, topY(Math.floor(player.x), Math.floor(player.z)));
  spawnBunnies();
  document.getElementById('title').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  if (isTouch){ joy.style.display='block'; jumpBtn.style.display='block'; modeBtn.style.display='block'; }
  selectSlot(0);
  if (isTouch) { mobileMode='break'; modeBtn.textContent='⛏️ こわす'; }
  playing = true;
  showMsg(data ? 'おかえりなさい！ つづきから あそぼう🌸' : 'ようこそ！ すきに たんけんしてね🍓');
}
function goHome(){
  saveNow(); playing = false;
  if (document.pointerLockElement) document.exitPointerLock();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('title').style.display = 'flex';
  renderTitle();
}
document.getElementById('homeBtn').addEventListener('click', goHome);
document.getElementById('newWorldBtn').addEventListener('click', ()=> startWorld(null));

function renderTitle(){
  const list = document.getElementById('worldList');
  list.innerHTML = '';
  for (const w of listWorlds()){
    const row = document.createElement('div'); row.className = 'worldRow';
    const b = document.createElement('button'); b.className = 'load';
    const d = new Date(w.saved);
    b.textContent = `🗺️ せかい No.${w.seed}（${d.getMonth()+1}/${d.getDate()} ほぞん）`;
    b.addEventListener('click', ()=> startWorld(w));
    const del = document.createElement('button'); del.className = 'del'; del.textContent = '🗑️';
    del.addEventListener('click', ()=>{
      if (confirm('この せかいを けしてもいい？')){ localStorage.removeItem(PREFIX+w.seed); renderTitle(); }
    });
    row.append(b, del); list.appendChild(row);
  }
}
renderTitle();

/* ================= メインループ ================= */
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setInterval(saveNow, 12000);
addEventListener('beforeunload', saveNow);

let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;
  if (playing){
    physics(dt);
    updateChunks();
    updBunnies(dt);
    updParticles(dt);
    for (const c of clouds){
      c.position.x += c.userData.v*dt;
      if (c.position.x > player.x+130) c.position.x = player.x-130;
    }
  }
  updSky(playing ? dt : 0);
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);
</script>
