<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書作成ツール</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <section class="editor no-print">
    <h1>見積書作成ツール</h1>

    <fieldset>
      <legend>基本情報</legend>
      <label>見積番号
        <input type="text" id="quoteNumber" placeholder="例: 2026-0001">
      </label>
      <label>発行日
        <input type="date" id="issueDate">
      </label>
      <label>有効期限
        <input type="date" id="validUntil">
      </label>
      <label>件名
        <input type="text" id="subject" placeholder="例: ○○工事費用">
      </label>
    </fieldset>

    <fieldset>
      <legend>宛先</legend>
      <label>宛先名
        <input type="text" id="clientName" placeholder="例: 株式会社○○ 御中">
      </label>
    </fieldset>

    <fieldset>
      <legend>明細</legend>
      <table class="item-input-table">
        <thead>
          <tr>
            <th>品目</th>
            <th>数量</th>
            <th>単位</th>
            <th>単価</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="itemRows"></tbody>
      </table>
      <button type="button" id="addItem">＋ 明細行を追加</button>
    </fieldset>

    <fieldset>
      <legend>税・備考</legend>
      <label>消費税率（%）
        <input type="number" id="taxRate" value="10" min="0" step="1">
      </label>
      <label>備考
        <textarea id="notes" rows="3" placeholder="例: お振込手数料は貴社にてご負担願います。"></textarea>
      </label>
    </fieldset>

    <fieldset>
      <legend>発行者情報</legend>
      <label>会社名・氏名
        <input type="text" id="issuerName" placeholder="例: 株式会社○○">
      </label>
      <label>住所
        <input type="text" id="issuerAddress" placeholder="例: 東京都○○区○○1-2-3">
      </label>
      <label>電話番号
        <input type="text" id="issuerTel" placeholder="例: 03-1234-5678">
      </label>
    </fieldset>

    <button type="button" id="printBtn" class="primary">印刷 / PDF保存</button>
  </section>

  <section class="preview-wrap">
    <div class="quotation" id="quotation">
      <header class="quotation-header">
        <h1>御　見　積　書</h1>
        <dl class="quotation-meta">
          <div><dt>見積番号</dt><dd id="out-quoteNumber"></dd></div>
          <div><dt>発行日</dt><dd id="out-issueDate"></dd></div>
          <div><dt>有効期限</dt><dd id="out-validUntil"></dd></div>
        </dl>
      </header>

      <div class="quotation-parties">
        <div class="client">
          <p class="client-name" id="out-clientName"></p>
          <p class="subject">件名：<span id="out-subject"></span></p>
        </div>
        <div class="issuer">
          <p id="out-issuerName"></p>
          <p id="out-issuerAddress"></p>
          <p id="out-issuerTel"></p>
        </div>
      </div>

      <p class="lead-text">下記のとおりお見積り申し上げます。</p>

      <table class="quotation-total-table">
        <tr><th>合計金額（税込）</th><td id="out-grandTotal" class="amount"></td></tr>
      </table>

      <table class="quotation-item-table">
        <thead>
          <tr>
            <th>品目</th>
            <th>数量</th>
            <th>単位</th>
            <th>単価</th>
            <th>金額</th>
          </tr>
        </thead>
        <tbody id="out-itemRows"></tbody>
      </table>

      <table class="quotation-summary-table">
        <tr><th>小計</th><td id="out-subtotal" class="amount"></td></tr>
        <tr><th>消費税（<span id="out-taxRate"></span>%）</th><td id="out-tax" class="amount"></td></tr>
        <tr class="total-row"><th>合計</th><td id="out-total" class="amount"></td></tr>
      </table>

      <div class="quotation-notes">
        <p class="notes-label">備考</p>
        <p id="out-notes"></p>
      </div>
    </div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
