<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積項目入力フォーム - Crastore</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:#e9ebee; margin:0; padding:16px; color:#222; }
  .wrap { max-width:560px; margin:0 auto; }
  .top-line { height:3px; background:#497B9F; border-radius:2px; }
  h1 { font-size:18px; margin:14px 2px 4px; }
  .lead { font-size:13px; color:#666; margin:0 2px 16px; line-height:1.6; }
  .card { background:#fff; border-radius:8px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  label { display:block; font-size:12px; color:#497B9F; font-weight:bold; margin:10px 0 4px; }
  input, textarea { width:100%; border:1px solid #c2c8cf; border-radius:6px; padding:10px;
    font-size:16px; font-family:inherit; }
  input:focus, textarea:focus { outline:2px solid #497B9F; border-color:#497B9F; }
  .item { border:1px solid #e0e4e8; border-radius:8px; padding:12px; margin-bottom:10px; position:relative; }
  .item .idx { position:absolute; top:-9px; left:10px; background:#497B9F; color:#fff;
    font-size:11px; border-radius:8px; padding:1px 8px; }
  .item .del { position:absolute; top:-9px; right:10px; background:#c0622d; color:#fff; border:none;
    font-size:11px; border-radius:8px; padding:1px 8px; cursor:pointer; }
  .grid3 { display:grid; grid-template-columns: 1fr 1fr 1.4fr; gap:8px; }
  .addBtn { width:100%; padding:12px; font-size:14px; background:#fff; color:#497B9F;
    border:2px dashed #497B9F; border-radius:8px; cursor:pointer; margin-bottom:14px; }
  .total { text-align:right; font-size:15px; margin:4px 2px 14px; }
  .total b { font-size:20px; }
  .makeBtn { width:100%; padding:15px; font-size:16px; font-weight:bold; background:#497B9F; color:#fff;
    border:none; border-radius:8px; cursor:pointer; }
  .result { display:none; }
  .result.show { display:block; }
  .result textarea { font-size:12px; color:#555; height:74px; }
  .copyBtn, .shareBtn { width:100%; padding:13px; font-size:15px; border-radius:8px; border:none;
    cursor:pointer; margin-top:8px; font-weight:bold; }
  .copyBtn { background:#2e7d32; color:#fff; }
  .shareBtn { background:#06c755; color:#fff; }
  .note { font-size:12px; color:#888; line-height:1.6; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-line"></div>
  <h1>見積・請求 入力フォーム</h1>
  <p class="lead">株式会社Crastoreへ提出する見積／請求の項目・金額をご入力ください。<br>
  入力後「送信用リンクを作成」を押し、表示されたリンクをLINE等でご返信ください。</p>

  <div class="card">
    <label>書類の種類</label>
    <div style="display:flex; gap:8px;">
      <label style="flex:1; display:flex; align-items:center; gap:6px; margin:0; padding:10px;
        border:1px solid #c2c8cf; border-radius:6px; font-size:15px; color:#222; font-weight:normal; cursor:pointer;">
        <input type="radio" name="docType" value="estimate" checked style="width:auto;"> 見積
      </label>
      <label style="flex:1; display:flex; align-items:center; gap:6px; margin:0; padding:10px;
        border:1px solid #c2c8cf; border-radius:6px; font-size:15px; color:#222; font-weight:normal; cursor:pointer;">
        <input type="radio" name="docType" value="invoice" style="width:auto;"> 請求
      </label>
    </div>
    <label>貴社名（業者名）</label>
    <input id="vendorName" placeholder="例）株式会社◯◯工務店">
    <label>工事名・内容</label>
    <input id="workName" placeholder="例）内装工事">
    <label>現場住所（わかれば）</label>
    <input id="siteAddr" placeholder="例）大阪市西成区◯◯1-2-3">
  </div>

  <div id="items"></div>
  <button class="addBtn" onclick="addItem()">＋ 項目を追加</button>

  <div class="card">
    <label>備考（任意）</label>
    <textarea id="remark" rows="2" placeholder="補足があればご記入ください"></textarea>
  </div>

  <div class="total">合計（税抜）: <b id="total">¥0</b></div>
  <button class="makeBtn" onclick="makeLink()">送信用リンクを作成</button>

  <div class="card result" id="result">
    <label>このリンクをコピーしてLINE等で返信してください</label>
    <textarea id="linkBox" readonly onclick="this.select()"></textarea>
    <button class="copyBtn" onclick="copyLink()">リンクをコピー</button>
    <button class="shareBtn" id="shareBtn" onclick="shareLink()">共有（LINEなど）</button>
    <p class="note">※ リンクを開くとCrastoreの見積書フォーマットに自動反映されます。</p>
  </div>
</div>

<script>
let count = 0;
function addItem(){
  count++;
  const div = document.createElement("div");
  div.className = "item card";
  div.innerHTML =
    '<span class="idx">項目 '+count+'</span>'
    + '<button class="del" onclick="this.parentNode.remove(); recalc()">削除</button>'
    + '<label>内容</label><input class="f-detail" placeholder="例）サッシ取付工事">'
    + '<div class="grid3">'
    + '<div><label>数量</label><input class="f-qty" type="number" inputmode="decimal" placeholder="1" oninput="recalc()"></div>'
    + '<div><label>単位</label><input class="f-unit" placeholder="式"></div>'
    + '<div><label>単価（円）</label><input class="f-price" type="number" inputmode="numeric" placeholder="50000" oninput="recalc()"></div>'
    + '</div>';
  document.getElementById("items").appendChild(div);
}
function collect(){
  const items = [];
  document.querySelectorAll("#items .item").forEach(it=>{
    const detail = it.querySelector(".f-detail").value.trim();
    const qty   = parseFloat(it.querySelector(".f-qty").value);
    const unit  = it.querySelector(".f-unit").value.trim() || "式";
    const price = parseFloat(it.querySelector(".f-price").value);
    if (!detail) return;
    if (qty && price) items.push({ detail, qty, unit, price });
    else if (price)   items.push({ detail, unit, amount: price });
  });
  return items;
}
function recalc(){
  const t = collect().reduce((s,i)=> s + (i.amount != null ? i.amount : i.qty*i.price), 0);
  document.getElementById("total").textContent = "¥" + t.toLocaleString();
}
function makeLink(){
  const items = collect();
  if (!items.length){ alert("項目を1つ以上入力してください。"); return; }
  const vendor = document.getElementById("vendorName").value.trim();
  const remark = [vendor ? "【"+vendor+" 入力分】" : "", document.getElementById("remark").value.trim()]
    .filter(Boolean).join(" ");
  const d = {
    type: document.querySelector('input[name="docType"]:checked').value,
    date: new Date().toLocaleDateString("ja-JP", {year:"numeric",month:"2-digit",day:"2-digit"}).replace(/-/g,"/"),
    workName: document.getElementById("workName").value.trim(),
    siteAddr: document.getElementById("siteAddr").value.trim(),
    remark, taxRate: 10, items
  };
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(d))))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  const url = location.href.replace(/vendor\.html.*$/, "estimate.html?d=" + b64);
  document.getElementById("linkBox").value = url;
  document.getElementById("result").classList.add("show");
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}
function copyLink(){
  navigator.clipboard.writeText(document.getElementById("linkBox").value)
    .then(()=>alert("コピーしました。LINE等に貼り付けて返信してください。"));
}
function shareLink(){
  const url = document.getElementById("linkBox").value;
  if (navigator.share) navigator.share({ title:"見積項目（Crastore宛）", url });
  else copyLink();
}
addItem(); addItem(); addItem();
</script>
</body>
</html>
